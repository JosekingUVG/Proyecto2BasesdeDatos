<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Sistema de Inventario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/styles.css" />
  </head>
  <body>
    <div id="app-shell"></div>

    <main class="inventory-layout reveal-in">
      <section class="inventory-toolbar">
        <h1>Inventario</h1>
        <div class="filters-grid">
          <label class="field-group" for="filtro-categoria">
            Categoria
            <select id="filtro-categoria" name="categoria">
              <option value="">Todas</option>
            </select>
          </label>

          <label class="field-group" for="filtro-precio">
            Precio minimo
            <input
              id="filtro-precio"
              name="precio_min"
              type="number"
              min="0"
              step="0.01"
              placeholder="Ej. 100"
            />
          </label>

          <button id="btn-filtrar" type="button" class="btn-primary">Aplicar filtros</button>
        </div>
      </section>

      <section class="inventory-table-card">
        <div class="table-head">
          <h2>Tabla de inventario</h2>
          <p id="inventory-feedback" class="feedback"></p>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Marca</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Status</th>
                <th>Proveedor</th>
                <th>Categoria</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-inventario-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="/controllers/inventario-dom.js"></script>
  </body>
</html>
